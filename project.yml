name: PDFQuizApp
options:
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  PDFQuizApp:
    type: application
    platform: iOS
    sources:
      - path: PDFQuizApp
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pdfquiz.app
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
