name: PDFQuizApp
options:
  bundleIdPrefix: com.pdfquiz
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  PDFQuizApp:
    type: application
    platform: iOS
    sources:
      - path: PDFQuizApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pdfquiz.app
        PRODUCT_NAME: "PDFQuizApp"
        INFOPLIST_FILE: PDFQuizApp/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        DEVELOPMENT_TEAM: ""
        PROVISIONING_PROFILE: ""
    dependencies: []

  PDFQuizAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PDFQuizAppTests
    dependencies:
      - target: PDFQuizApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pdfquiz.app.tests
        INFOPLIST_FILE: PDFQuizApp/Info.plist
