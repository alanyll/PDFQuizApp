name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode info
        run: |
          xcodebuild -version
          ls -d /Applications/Xcode*.app 2>/dev/null || true

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          set -ex
          xcodegen generate
          echo "=== Generated project structure ==="
          find PDFQuizApp.xcodeproj -type f
          echo "=== pbxproj first 100 lines ==="
          head -100 PDFQuizApp.xcodeproj/project.pbxproj | grep -v '^$'

      - name: Build (test compilation)
        run: |
          set -ex
          xcodebuild build \
            -project PDFQuizApp.xcodeproj \
            -scheme PDFQuizApp \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            2>&1 | tail -80

      - name: Archive
        run: |
          set -ex
          xcodebuild archive \
            -project PDFQuizApp.xcodeproj \
            -scheme PDFQuizApp \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath Archive.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE=""
          echo "=== Archive contents ==="
          ls -la Archive.xcarchive/

      - name: Export IPA
        if: success()
        run: |
          set -ex
          cat > exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath Archive.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath Export
          ls -la Export/

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PDFQuizApp.ipa
          path: Export/*.ipa
          retention-days: 7
