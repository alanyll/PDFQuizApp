name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode info
        run: |
          xcodebuild -version
          ls -d /Applications/Xcode*.app 2>/dev/null || true

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          set -ex
          xcodegen generate

      - name: Build app
        run: |
          set -ex
          xcodebuild build \
            -project PDFQuizApp.xcodeproj \
            -scheme PDFQuizApp \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath .build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            2>&1 | tail -30

      - name: Find .app and package IPA
        run: |
          set -ex
          # Find the built .app
          APP_PATH=$(find .build -name "*.app" -type d | head -1)
          echo "App found at: $APP_PATH"
          ls -la "$APP_PATH"

          # Create Payload folder and package as IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r PDFQuizApp.ipa Payload/
          ls -la PDFQuizApp.ipa

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PDFQuizApp.ipa
          path: PDFQuizApp.ipa
          retention-days: 7
