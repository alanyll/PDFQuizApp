name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode info
        run: |
          xcodebuild -version
          ls -d /Applications/Xcode*.app 2>/dev/null || true

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          set -ex
          xcodegen generate

      - name: Build app
        run: |
          set -ex
          xcodebuild build \
            -project PDFQuizApp.xcodeproj \
            -scheme PDFQuizApp \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath .build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            2>&1 | tail -30

      - name: Find .app and package IPA
        run: |
          set -ex
          # List build directory for debugging
          echo "=== Derived data structure ==="
          find .build -maxdepth 5 -type d 2>/dev/null || true

          # The .app is typically in .build/Build/Products/Release-iphoneos/
          APP_PATH=".build/Build/Products/Release-iphoneos/PDFQuizApp.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find .build -name "*.app" -type d -not -path "*.dSYM*" | head -1)
          fi

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found!"
            echo "Searching..."
            find .build -name "*.app" -type d 2>/dev/null
            find .build -name "PDFQuizApp" -type f 2>/dev/null
            exit 1
          fi

          echo "App found at: $APP_PATH"
          ls -la "$APP_PATH"

          # Create Payload folder and package as IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r PDFQuizApp.ipa Payload/
          echo "IPA size: $(du -sh PDFQuizApp.ipa | cut -f1)"

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PDFQuizApp.ipa
          path: PDFQuizApp.ipa
          retention-days: 7
