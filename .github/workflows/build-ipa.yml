name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode versions
        run: |
          ls -d /Applications/Xcode*.app 2>/dev/null || true
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path 2>/dev/null || true

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          set -ex
          xcodegen generate
          ls -la PDFQuizApp.xcodeproj/

      - name: Show build settings (debug)
        run: |
          set -ex
          xcodebuild -project PDFQuizApp.xcodeproj \
            -scheme PDFQuizApp \
            -showBuildSettings \
            -destination "generic/platform=iOS" \
            2>&1 | head -50

      - name: Archive (unsigned)
        run: |
          set -ex
          xcodebuild archive \
            -project PDFQuizApp.xcodeproj \
            -scheme PDFQuizApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath .build \
            -archivePath Archive.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE=""

      - name: Export IPA (unsigned)
        if: success()
        run: |
          set -ex
          cat > exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string></string>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath Archive.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath Export \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          ls -la Export/

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PDFQuizApp.ipa
          path: Export/*.ipa
          retention-days: 7
